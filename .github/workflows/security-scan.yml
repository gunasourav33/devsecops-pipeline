name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 3 * * 6'  # Runs at 03:00, only on Saturday

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    name: Secret Scanning (Gitleaks)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  sast:
    runs-on: ubuntu-latest
    name: SAST (Bandit)
    needs: secret-scan
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Bandit
        run: pip install bandit[sarif]

      - name: Run Bandit SAST scan
        run: |
          bandit -r app/ -f sarif -o bandit-results.sarif --exit-zero
        continue-on-error: true

      - name: Upload Bandit SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: bandit-results.sarif
          category: bandit

      - name: Upload Bandit results artifact
        uses: actions/upload-artifact@v4
        with:
          name: bandit-results
          path: bandit-results.sarif
          retention-days: 30

  dependency-check:
    runs-on: ubuntu-latest
    name: Dependency CVE Check (pip-audit)
    needs: secret-scan
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        run: |
          pip install -r requirements.txt
          pip-audit --format=json --output pip-audit-results.json || true

      - name: Upload pip-audit results
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-results
          path: pip-audit-results.json
          retention-days: 30

  iac-scan:
    runs-on: ubuntu-latest
    name: IaC Scan (Trivy config)
    needs: secret-scan
    steps:
      - uses: actions/checkout@v4

      - name: Trivy Dockerfile scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: 'config'
          scan-ref: '.'
          format: 'sarif'
          output: 'iac-scan.sarif'
          exit-code: '0'

      - name: Upload IaC SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: iac-scan.sarif
          category: trivy-iac

  container-scan:
    runs-on: ubuntu-latest
    name: Container Scan (Trivy)
    needs: [sast, dependency-check, iac-scan]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t app:test .

      - name: Trivy container scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: 'app:test'
          format: 'sarif'
          output: 'container-scan.sarif'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

      - name: Upload container scan SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: container-scan.sarif
          category: trivy-container
